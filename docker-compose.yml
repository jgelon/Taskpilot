version: '3.9'

services:
  api:
    build: ./backend
    container_name: taskpilot-api
    restart: unless-stopped
    environment:
      PORT: 3010
      DATA_FILE: /data/tasks.db
      AUTHENTIK_URL: ${AUTHENTIK_URL}
      AUTHENTIK_INTERNAL_URL: ${AUTHENTIK_INTERNAL_URL:-http://authentik-server:9000}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      FRONTEND_URL: ${APP_URL}
      ADMIN_GROUP: ${ADMIN_GROUP:-taskpilot-admin}
      FEATURE_POINTS: ${FEATURE_POINTS:-true}
      FEATURE_STREAKS: ${FEATURE_STREAKS:-true}
      FEATURE_ACHIEVEMENTS: ${FEATURE_ACHIEVEMENTS:-true}
      FEATURE_LEADERBOARD: ${FEATURE_LEADERBOARD:-true}
      FEATURE_ASSIGNMENT: ${FEATURE_ASSIGNMENT:-true}
      FEATURE_PUSH_NOTIFICATIONS: ${FEATURE_PUSH_NOTIFICATIONS:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@taskpilot.local}
    volumes:
      - ./data:/data
    networks:
      - internal
      - authentik_backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        AUTHENTIK_URL: ${AUTHENTIK_URL}
        OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
        APP_URL: ${APP_URL}
    container_name: taskpilot-frontend
    restart: unless-stopped
    networks:
      - internal
      - frontend
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.taskpilot.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.taskpilot.entrypoints=websecure"
      - "traefik.http.routers.taskpilot.tls.certresolver=letsencrypt"
      - "traefik.http.services.taskpilot.loadbalancer.server.port=80"
      - "traefik.docker.network=frontend"

networks:
  internal:
    driver: bridge
  frontend:
    external: true
  authentik_backend:
    external: true
    name: authentik_authentik_backend

