<div class="edit-task">
  <div class="edit-header">
    <h2 class="section-title">Edit Task</h2>
    <span class="status-badge" [class]="task.status">{{ task.status }}</span>
  </div>

  <div class="task-meta-info">
    <span class="meta-line">
      <span class="meta-icon">🗓</span> Added {{ formatDate(task.dateAdded) }}
      <span *ngIf="task.createdByName"> by <strong>{{ task.createdByName }}</strong></span>
    </span>
    <span class="meta-line closed-info" *ngIf="task.status === 'closed' && task.closedByName">
      <span class="meta-icon">✓</span> Closed {{ formatDate(task.closedAt) }}
      by <strong>{{ task.closedByName }}</strong>
    </span>
  </div>

  <div class="task-form">
    <div class="form-group">
      <label>Task Name *</label>
      <input type="text" [(ngModel)]="name" name="name" maxlength="120" />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="description" name="description" placeholder="Optional details..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Duration (min) *</label>
        <input type="text" inputmode="numeric" pattern="[0-9]*"
          [(ngModel)]="estimatedDurationStr" name="estimatedDuration" />
      </div>
      <div class="form-group">
        <label>Priority *</label>
        <select [(ngModel)]="priority" name="priority">
          <option value="1">1 — Critical</option>
          <option value="2">2 — High</option>
          <option value="3">3 — Medium</option>
          <option value="4">4 — Low</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" [(ngModel)]="dueDate" name="dueDate" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="status" name="status">
          <option value="open">Open</option>
          <option value="closed">Closed</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Category</label>
      <select [(ngModel)]="categoryId" name="categoryId">
        <option value="">No category</option>
        <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
      </select>
    </div>

    <div class="form-group" *ngIf="auth.features.assignment">
      <label>Assign to</label>
      <select [(ngModel)]="assignedToUsername" (ngModelChange)="onAssigneeChange($event)" name="assignedTo">
        <option value="">Unassigned</option>
        <option *ngFor="let u of users" [value]="u.username">{{ u.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label>Recurring</label>
      <select [(ngModel)]="recurring" name="recurring">
        <option value="none">Not recurring</option>
        <option value="soon">Soon — recreate immediately when done</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
        <option value="custom">Custom interval</option>
      </select>
    </div>

    <div class="form-group" *ngIf="recurring === 'custom'">
      <label>Repeat every (days)</label>
      <input type="text" inputmode="numeric" pattern="[0-9]*"
        [(ngModel)]="recurrenceDaysStr" name="recurrenceDays" />
    </div>

    <button class="btn-primary" type="button" (click)="save()" [disabled]="!isValid || loading">
      <span class="btn-spinner" *ngIf="loading && !closing && !deleting"></span>
      <span>{{ loading && !closing && !deleting ? 'Saving…' : 'Save Changes' }}</span>
    </button>
  </div>

  <div class="edit-actions">
    <button class="btn-success" type="button" (click)="closeTask()" *ngIf="task.status === 'open'" [disabled]="loading">
      <span class="btn-spinner" *ngIf="closing"></span>
      <span>{{ closing ? 'Closing…' : '✓ Mark Done' }}</span>
    </button>    <button class="btn-secondary" type="button" (click)="cancel.emit()" [disabled]="loading">Cancel</button>
    <button class="btn-danger" type="button" (click)="deleteTask()" [disabled]="loading">
      <span class="btn-spinner btn-spinner-danger" *ngIf="deleting"></span>
      <span>{{ deleting ? 'Deleting…' : confirmDelete ? 'Confirm Delete' : '🗑 Delete' }}</span>
    </button>
  </div>
</div>

<div class="toast" [class]="toast?.type" *ngIf="toast">{{ toast?.msg }}</div>
